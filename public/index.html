<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Themed Panel</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .panel {
            background-color: #2a2a2a;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ffcc00;
        }
        button {
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            color: #1e1e1e;
            cursor: pointer;
            padding: 10px 15px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Dark Themed Control Panel</h1>
        <button>Click Me!</button>
    </div>
</body>
</html>
